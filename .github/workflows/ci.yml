# GitHub Actions CI for DataAnalyticsLibrary.
#
# Runs on every push and pull request to the main branches. Two jobs:
#   1. test     -> run the pytest suite across several Python versions.
#   2. notebook -> execute the demo notebook end to end (smoke test).
#
# Action versions are pinned to current majors (checkout@v4, setup-python@v5).
name: CI

# When to run.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # 1. Unit tests across a matrix of Python versions.
  # -------------------------------------------------------------------------
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      # Don't abort the whole matrix if one version fails.
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          # Cache pip downloads keyed on requirements.txt for faster installs.
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        # MPLBACKEND=Agg makes matplotlib headless on the CI runner.
        env:
          MPLBACKEND: Agg
        run: pytest -q

  # -------------------------------------------------------------------------
  # 2. Execute the demo notebook (catches breakages in the documented flow).
  # -------------------------------------------------------------------------
  notebook:
    name: Execute demo notebook
    runs-on: ubuntu-latest
    # No need to block on this for every Python version; one is enough.
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate the synthetic sample dataset
        run: python data/generate_sample_data.py

      - name: Execute notebook end to end
        env:
          MPLBACKEND: Agg
        run: |
          jupyter nbconvert --to notebook --execute \
            --ExecutePreprocessor.timeout=300 \
            --output executed_demo.ipynb \
            notebooks/pipeline_demo.ipynb

      - name: Upload executed notebook as an artifact
        # Keep the rendered result for inspection, even if later steps fail.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: executed-demo-notebook
          path: notebooks/executed_demo.ipynb
          if-no-files-found: ignore
